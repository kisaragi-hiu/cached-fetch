name: Publish
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
      - name: Install deps
        run: |
          deno install
      - name: Test
        run: |
          deno run test
      - name: Build
        run: |
          deno run build
      - name: Publish
        run: |
          npm publish --access public
